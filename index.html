<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector Bíblico - Comentarios en Español</title>
    <style>
        :root {
            --bg-app: #f8fafc;
            --bg-panel: #ffffff;
            --bg-header: #0f172a;
            --bg-topbar: #ffffff;
            --border-color: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-color: #0f172a;
            --accent-hover: #1e293b;
            --gold-light: #fef08a;
            --gold-text: #fef08a;
            --verse-hover: #f1f5f9;
            --commentary-bg: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-app); min-height: 100vh; padding: 0; color: var(--text-primary); -webkit-font-smoothing: antialiased; }
        
        .app { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg-app); }
        
        /* flat solid header */
        .app-header { background: var(--bg-header); padding: 20px 32px; text-align: left; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .app-header h1 { font-size: 1.4em; color: #ffffff; letter-spacing: 1px; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        .app-header h1 small { font-size: 0.5em; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; font-weight: 500; border-left: 1px solid #334155; padding-left: 12px; }
        
        /* flat top bar */
        .top-bar { background: var(--bg-topbar); padding: 12px 32px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; border-bottom: 1px solid var(--border-color); }
        .top-bar .field { display: flex; flex-direction: column; gap: 4px; }
        .top-bar .field label { font-size: 0.65em; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); font-weight: 700; }
        
        .top-bar select, .top-bar button { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 0.85em; background: var(--bg-panel); color: var(--text-primary); cursor: pointer; transition: none; font-family: inherit; min-width: 140px; outline: none; }
        .top-bar select:hover, .top-bar button:hover { border-color: var(--text-secondary); }
        .top-bar select:focus { border-color: var(--accent-color); }
        
        .top-bar button { background: var(--accent-color); color: #ffffff; font-weight: 600; border: none; min-width: auto; }
        .top-bar button:hover { background: var(--accent-hover); }
        
        .btn-night { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); border-radius: 4px; padding: 8px 12px; font-size: 1.1em; cursor: pointer; line-height: 1; min-width: auto; }
        .btn-night:hover { border-color: var(--text-primary); color: var(--text-primary); }
        
        /* structured main content */
        .main { display: flex; flex: 1; overflow: hidden; background: var(--bg-panel); }
        .panel { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-panel); }
        .panel + .panel { border-left: 1px solid var(--border-color); }
        
        .panel-header { padding: 14px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: var(--bg-app); }
        .panel-header h2 { font-size: 0.75em; text-transform: uppercase; letter-spacing: 2px; color: var(--text-primary); font-weight: 700; }
        
        .panel-body { flex: 1; overflow-y: auto; padding: 24px 32px; }
        .panel-body::-webkit-scrollbar { width: 6px; }
        .panel-body::-webkit-scrollbar-track { background: var(--bg-app); }
        .panel-body::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        
        .commentary-wrap { display: none; }
        .commentary-wrap.visible { display: flex; }
        
        /* buttons */
        .btn-commentary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); border-radius: 4px; padding: 6px 14px; font-size: 0.75em; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; font-family: inherit; }
        .btn-commentary:hover { border-color: var(--text-primary); color: var(--text-primary); }
        .btn-commentary.active { background: var(--accent-color); border-color: var(--accent-color); color: #ffffff; }
        
        /* structured reading content */
        .chapter-content { line-height: 1.9; font-size: 1.05em; color: var(--text-primary); }
        .verse { margin-bottom: 8px; padding: 6px 10px; border-radius: 4px; border-left: 2px solid transparent; }
        .verse:hover { background: var(--verse-hover); border-left-color: var(--border-color); }
        .verse-number { font-weight: 700; color: var(--text-secondary); margin-right: 12px; font-size: 0.8em; letter-spacing: 0.5px; }
        
        .heading { font-weight: 700; color: var(--text-primary); margin: 28px 0 12px 0; font-size: 1.15em; letter-spacing: 0.2px; text-transform: uppercase; font-size: 0.9em; }
        
        .commentary-verse { margin-bottom: 20px; padding: 16px; background: var(--commentary-bg); border: 1px solid var(--border-color); border-left: 3px solid var(--accent-color); border-radius: 4px; }
        .commentary-verse-number { font-weight: 700; color: var(--text-primary); margin-bottom: 8px; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; }
        .commentary-text { line-height: 1.8; color: var(--text-secondary); }
        
        .loading { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 0.9em; letter-spacing: 1px; text-transform: uppercase; }
        .error { background: #fff1f2; color: #991b1b; padding: 16px; border-radius: 4px; margin: 16px 0; border: 1px solid #fee2e2; border-left: 4px solid #dc2626; font-size: 0.9em; }
        .info-box { background: var(--commentary-bg); color: var(--text-primary); padding: 16px; border-radius: 4px; margin: 16px 0; border: 1px solid var(--border-color); border-left: 4px solid var(--accent-color); font-size: 0.9em; }
        .translation-notice { background: #fffbeb; color: #78350f; padding: 12px 16px; border-radius: 4px; margin-bottom: 20px; font-size: 0.85em; border: 1px solid #fef3c7; border-left: 4px solid #d97706; }
        
        .app-footer { background: var(--bg-app); padding: 16px 32px; text-align: center; color: var(--text-muted); font-size: 0.75em; border-top: 1px solid var(--border-color); letter-spacing: 0.5px; }
        
        /* Night Mode Variables Overrides */
        .app.night {
            --bg-app: #090d16;
            --bg-panel: #0f172a;
            --bg-header: #020617;
            --bg-topbar: #0f172a;
            --border-color: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent-color: #f8fafc;
            --accent-hover: #e2e8f0;
            --verse-hover: #1e293b;
            --commentary-bg: #090d16;
        }
        
        .app.night .top-bar button { background: var(--gold-light); color: #020617; }
        .app.night .top-bar button:hover { background: #fef08a; }
        .app.night .btn-commentary.active { background: var(--gold-light); border-color: var(--gold-light); color: #020617; }
        .app.night .btn-commentary:hover { border-color: var(--gold-light); color: var(--gold-light); }
        .app.night .translation-notice { background: rgba(217,119,6,0.1); color: var(--gold-light); border-color: rgba(217,119,6,0.2); }
        .app.night .error { background: rgba(220,38,38,0.1); color: #fca5a5; border-color: rgba(220,38,38,0.2); }

        .btn-size { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); border-radius: 4px; padding: 4px 9px; font-size: 0.85em; cursor: pointer; transition: none; font-family: inherit; line-height: 1; min-width: auto; }
        .btn-size:hover { border-color: var(--text-primary); color: var(--text-primary); }
        .btn-size .sz-label { display: inline-block; min-width: 20px; text-align: center; font-size: 0.78em; color: var(--text-muted); }
        
        .app.sz-s .chapter-content { font-size: 0.9em; }
        .app.sz-m .chapter-content { font-size: 1em; }
        .app.sz-l .chapter-content { font-size: 1.15em; }
        .app.sz-xl .chapter-content { font-size: 1.35em; }
        .app.sz-s .chapter-content .verse-number { font-size: 0.8em; }
        .app.sz-l .chapter-content .verse-number { font-size: 0.9em; }
        .app.sz-xl .chapter-content .verse-number { font-size: 0.95em; }
        .app.sz-l .chapter-content .heading { font-size: 1.2em; }
        .app.sz-xl .chapter-content .heading { font-size: 1.35em; }

        @media (max-width: 768px) {
            .top-bar { flex-direction: column; align-items: stretch; padding: 16px; }
            .top-bar select { min-width: auto; }
            .main { flex-direction: column; }
            .panel + .panel { border-left: none; border-top: 1px solid var(--border-color); }
            .commentary-wrap.visible { display: flex; }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>LUMBRE <small>Estudio Bíblico · Comentarios · Traducción</small></h1>
        </header>

        <div class="top-bar">
            <div class="field">
                <label for="translation">Traducción</label>
                <select id="translation">
                    <option value="spa_r09">Reina Valera 1909</option>
                    <option value="spa_rvg">Reina Valera Gómez</option>
                    <option value="spa_pdt">Palabra de Dios para ti</option>
                </select>
            </div>
            <div class="field">
                <label for="commentary">Comentario</label>
                <select id="commentary">
                    <option value="jamieson-fausset-brown">Jamieson-Fausset-Brown</option>
                    <option value="matthew-henry">Matthew Henry</option>
                    <option value="john-gill">John Gill</option>
                </select>
            </div>
            <div class="field">
                <label for="book">Libro</label>
                <select id="book"><option value="">Cargando...</option></select>
            </div>
            <div class="field">
                <label for="chapter">Capítulo</label>
                <select id="chapter"><option value="1">1</option></select>
            </div>
            <div class="field">
                <label>&nbsp;</label>
                <div style="display:flex;gap:6px">
                    <button onclick="loadChapter()">Recargar</button>
                    <button class="btn-night" id="nightToggle" onclick="toggleNight()" title="Modo nocturno">&#9790;</button>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="panel">
                <div class="panel-header">
                    <h2 id="bible-title">Texto Bíblico</h2>
                    <div style="display:flex;gap:4px;align-items:center">
                        <button class="btn-size" onclick="changeSize(-1)" title="Reducir texto">A−</button>
                        <span class="sz-label" id="sizeLabel">M</span>
                        <button class="btn-size" onclick="changeSize(1)" title="Aumentar texto">A+</button>
                        <button id="toggleCommentaryBtn" class="btn-commentary" onclick="toggleCommentary()" style="margin-left:6px">Ver comentario</button>
                    </div>
                </div>
                <div class="panel-body">
                    <div id="bible-content" class="chapter-content">
                        <div class="loading">Selecciona un libro y capítulo</div>
                    </div>
                </div>
            </div>

            <div id="commentaryWrap" class="panel commentary-wrap">
                <div class="panel-header">
                    <h2 id="commentary-title">Comentario Bíblico</h2>
                </div>
                <div class="panel-body">
                    <div id="commentary-content" class="chapter-content">
                        <div class="loading">El comentario aparecerá aquí</div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="app-footer">
            Los comentarios se traducen automáticamente del inglés al español. &middot; Datos: Free Bible API
        </footer>
    </div>

    <script>
        const API_BASE = 'https://bible.helloao.org/api';
        
        // 🔥 CONFIGURACIÓN CLAVE: Activa la traducción automática
        const TRADUCIR_COMENTARIOS = true; 

        let booksData = {};
        let currentTranslation = 'spa_r09';
        let currentCommentary = 'jamieson-fausset-brown';
        let currentBook = 'GEN';
        let currentChapter = 1;

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('lumbre-night') === 'true') {
                document.querySelector('.app').classList.add('night');
                document.getElementById('nightToggle').innerHTML = '&#9728;';
            }

            const savedSize = parseInt(localStorage.getItem('lumbre-size'));
            if (savedSize >= 0 && savedSize < SIZES.length) {
                sizeIndex = savedSize;
                document.querySelector('.app').classList.add(SIZES[sizeIndex]);
                document.getElementById('sizeLabel').textContent = SIZE_LABELS[sizeIndex];
            } else {
                document.querySelector('.app').classList.add('sz-m');
            }

            loadBooks();
            
            document.getElementById('translation').addEventListener('change', async (e) => {
                currentTranslation = e.target.value;
                await loadBooks(true);
                loadChapter();
            });

            document.getElementById('commentary').addEventListener('change', (e) => {
                currentCommentary = e.target.value;
                loadCommentary(); // Solo recarga el comentario
            });

            document.getElementById('book').addEventListener('change', (e) => {
                currentBook = e.target.value;
                loadChapters();
            });

            document.getElementById('chapter').addEventListener('change', (e) => {
                currentChapter = parseInt(e.target.value);
                loadChapter();
            });
        });

        async function loadBooks(keepSelection) {
            const bookSelect = document.getElementById('book');
            bookSelect.innerHTML = '<option value="">Cargando...</option>';
            try {
                const response = await fetch(`${API_BASE}/${currentTranslation}/books.json`);
                const data = await response.json();
                booksData = data.books;
                bookSelect.innerHTML = '';
                data.books.forEach(book => {
                    const option = document.createElement('option');
                    option.value = book.id;
                    option.textContent = book.name || book.commonName;
                    bookSelect.appendChild(option);
                });
                if (keepSelection) {
                    bookSelect.value = currentBook;
                } else {
                    currentBook = data.books[0].id;
                    loadChapters();
                }
            } catch (error) {
                bookSelect.innerHTML = '<option value="">Error</option>';
            }
        }

        function loadChapters() {
            const chapterSelect = document.getElementById('chapter');
            const book = booksData.find(b => b.id === currentBook);
            if (!book) return;
            chapterSelect.innerHTML = '';
            for (let i = book.firstChapterNumber; i <= book.lastChapterNumber; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                chapterSelect.appendChild(option);
            }
            currentChapter = book.firstChapterNumber;
            loadChapter();
        }

        async function loadChapter() {
            const bibleContent = document.getElementById('bible-content');
            const bibleTitle = document.getElementById('bible-title');
            const commentaryTitle = document.getElementById('commentary-title');

            // Reset commentary panel to collapsed
            const wrap = document.getElementById('commentaryWrap');
            const toggleBtn = document.getElementById('toggleCommentaryBtn');
            wrap.classList.remove('visible');
            toggleBtn.classList.remove('active');
            toggleBtn.textContent = 'Ver comentario';

            bibleContent.innerHTML = '<div class="loading">Cargando texto bíblico...</div>';
            document.getElementById('commentary-content').innerHTML = '<div class="loading">Cargando y traduciendo comentario...</div>';

            const book = booksData.find(b => b.id === currentBook);
            if (book) bibleTitle.textContent = `${book.name || book.commonName} ${currentChapter}`;
            commentaryTitle.textContent = document.getElementById('commentary').options[document.getElementById('commentary').selectedIndex].text;

            try {
                const bibleResponse = await fetch(`${API_BASE}/${currentTranslation}/${currentBook}/${currentChapter}.json`);
                const bibleData = await bibleResponse.json();
                renderBibleText(bibleData);
                await loadCommentary();
            } catch (error) {
                bibleContent.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        function renderBibleText(data) {
            const bibleContent = document.getElementById('bible-content');
            let html = '';
            data.chapter.content.forEach(item => {
                if (item.type === 'heading') {
                    html += `<div class="heading">${item.content.join(' ')}</div>`;
                } else if (item.type === 'verse') {
                    let verseText = item.content.map(c => typeof c === 'string' ? c : (c.text || '')).join('');
                    html += `<div class="verse"><span class="verse-number">${item.number}</span>${verseText}</div>`;
                }
            });
            bibleContent.innerHTML = html;
        }

        // 🔥 FUNCIÓN DE TRADUCCIÓN EN TIEMPO REAL
        async function translateText(text) {
            if (!TRADUCIR_COMENTARIOS) return text;
            try {
                // Usamos la API de Google Translate (clients5)
                const encodedText = encodeURIComponent(text.substring(0, 500)); // Limitamos longitud para evitar errores
                const url = `https://clients5.google.com/translate_a/t?client=dict-chrome-ex&sl=auto&tl=es&q=${encodedText}`;
                const response = await fetch(url);
                const data = await response.json();
                
                // La respuesta es un array de arrays, ej: [["Hola","en"], ["mundo","en"]]
                if (Array.isArray(data)) {
                    return data.map(item => item[0]).join('') || text;
                }
                return text;
            } catch (error) {
                console.warn("Error de traducción, mostrando texto original:", error);
                return text + " <em>(Error de traducción)</em>";
            }
        }

        async function loadCommentary() {
            const commentaryContent = document.getElementById('commentary-content');
            const commentaryTitle = document.getElementById('commentary-title');
            commentaryTitle.textContent = document.getElementById('commentary').options[document.getElementById('commentary').selectedIndex].text;
            commentaryContent.innerHTML = '<div class="loading">Cargando y traduciendo comentario...</div>';

            try {
                const response = await fetch(`${API_BASE}/c/${currentCommentary}/${currentBook}/${currentChapter}.json`);
                if (!response.ok) throw new Error('No disponible');
                
                const commentaryData = await response.json();
                let html = '';

                if (TRADUCIR_COMENTARIOS) {
                    html += `<div class="translation-notice">⚠️ <strong>Nota:</strong> Este comentario se traduce automáticamente del inglés en tiempo real. Puede haber pequeñas imprecisiones.</div>`;
                }

                if (commentaryData.chapter && commentaryData.chapter.content) {
                    for (const item of commentaryData.chapter.content) {
                        if (item.type === 'heading') {
                            let headingText = item.content.join(' ');
                            if (TRADUCIR_COMENTARIOS) headingText = await translateText(headingText);
                            html += `<div class="heading">${headingText}</div>`;
                        } else if (item.type === 'verse') {
                            let verseText = item.content.map(c => typeof c === 'string' ? c : (c.text || '')).join('');
                            
                            // 🔥 Traducimos el texto del comentario
                            if (TRADUCIR_COMENTARIOS) {
                                verseText = await translateText(verseText);
                            }

                            html += `
                                <div class="commentary-verse">
                                    <div class="commentary-verse-number">Versículo ${item.number}</div>
                                    <div class="commentary-text">${verseText}</div>
                                </div>
                            `;
                        }
                    }
                }
                
                commentaryContent.innerHTML = html || '<div class="info-box">No hay comentario para este capítulo.</div>';
                
            } catch (error) {
                commentaryContent.innerHTML = `
                    <div class="info-box">
                        <strong>Comentario no disponible</strong>
                        <p>Este comentario no cubre ${currentBook} ${currentChapter} o hubo un error de conexión.</p>
                    </div>`;
            }
        }
        const SIZES = ['sz-s', 'sz-m', 'sz-l', 'sz-xl'];
        const SIZE_LABELS = ['S', 'M', 'L', 'XL'];
        let sizeIndex = 1;

        function changeSize(delta) {
            sizeIndex = Math.max(0, Math.min(SIZES.length - 1, sizeIndex + delta));
            const app = document.querySelector('.app');
            SIZES.forEach(s => app.classList.remove(s));
            app.classList.add(SIZES[sizeIndex]);
            document.getElementById('sizeLabel').textContent = SIZE_LABELS[sizeIndex];
            localStorage.setItem('lumbre-size', sizeIndex);
        }

        function toggleNight() {
            const app = document.querySelector('.app');
            const btn = document.getElementById('nightToggle');
            app.classList.toggle('night');
            const isNight = app.classList.contains('night');
            btn.innerHTML = isNight ? '&#9728;' : '&#9790;';
            localStorage.setItem('lumbre-night', isNight);
        }

        function toggleCommentary() {
            const wrap = document.getElementById('commentaryWrap');
            const btn = document.getElementById('toggleCommentaryBtn');
            wrap.classList.toggle('visible');
            btn.classList.toggle('active');
            btn.textContent = wrap.classList.contains('visible') ? 'Ocultar comentario' : 'Ver comentario';
        }
    </script>
</body>
</html>
